version: "3.9"

x-api-env: &api-env
  DATABASE_URL: postgresql+asyncpg://postgres:${PG_PASSWORD:-devpassword}@postgres:5432/drapi
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-changeme-dev-secret-32chars-min}
  SEARXNG_URL: http://searxng:8080
  ENVIRONMENT: production

services:
  api:
    image: deep-research-api:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: deep-research-api:latest
    command: python -m arq core.queue.worker.WorkerSettings
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: drapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8085/
    ports:
      - "8085:8080"

volumes:
  pgdata:
  redisdata:
